# Stage 1: Parallel Security Scanning
# Executes Semgrep (SAST), Trivy (SCA), and OWASP ZAP (DAST) concurrently.
# Outputs: SARIF files for downstream triage.
name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily scan at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target repository to scan'
        required: false
        default: ''

# Least privilege: minimal permissions
permissions:
  contents: read
  security-events: write
  statuses: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  SCAN_TIMEOUT: 120
  SEMGREP_RULES: p/owasp-top-ten p/cwe-top-25
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_FORMAT: sarif

jobs:
  semgrep-sast:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep SAST scan
        uses: semgrep/scanning-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/cwe-top-25
            p/secrets
          sarif_file: reports/sarif/semgrep-results.sarif
          audit_on: ignore
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: reports/sarif/semgrep-results.sarif
          retention-days: 30

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/sarif/semgrep-results.sarif

  trivy-sca:
    name: SCA Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: reports/sbom/sbom.spdx.json

      - name: Run Trivy SCA scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,config'
          severity: ${{ env.TRIVY_SEVERITY }}
          format: 'sarif'
          output: 'reports/sarif/trivy-results.sarif'
          exit-code: '0'  # Don't fail; triage handles severity

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: reports/sarif/trivy-results.sarif
          retention-days: 30

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/sarif/trivy-results.sarif

  zap-dast:
    name: DAST Scan (ZAP)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start target application (if applicable)
        run: |
          # For local testing; adjust for your target
          echo "DAST requires running target application"
          echo "Skipping in default configuration"

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false

      - name: Convert ZAP results to SARIF
        if: always()
        run: |
          mkdir -p reports/sarif
          # ZAP outputs JSON; convert to SARIF format
          # Using built-in ZAP SARIF export
          cp zap_report.json reports/sarif/zap-results.sarif 2>/dev/null || echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json","version":"2.1.0","runs":[]}' > reports/sarif/zap-results.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-sarif
          path: reports/sarif/zap-results.sarif
          retention-days: 30

  collect-results:
    name: Collect Scan Results
    needs: [semgrep-sast, trivy-sca]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      scan_status: ${{ steps.set-status.outputs.status }}
    steps:
      - name: Determine scan status
        id: set-status
        run: |
          if [[ "${{ needs.semgrep-sast.result }}" == "failure" || "${{ needs.trivy-sca.result }}" == "failure" ]]; then
            echo "status=failed" >> $GITHUB_OUTPUT
          else
            echo "status=completed" >> $GITHUB_OUTPUT
          fi

      - name: Update commit status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ steps.set-status.outputs.status }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status === 'completed' ? 'success' : 'failure',
              context: 'security-scan',
              description: `Security scan ${status}`,
            });
